openapi: 3.0.3
info:
  title: E-Commerce REST API
  description: |
    REST API for e-commerce with JWT authentication and checkout.

    **Checkout rules:**
    - Only authenticated users can checkout.
    - Payment methods: `cash` or `credit_card` only.
    - Cash payments receive a 10% discount on the subtotal.
  version: 1.0.0
  contact:
    name: E-Commerce API Support

servers:
  - url: http://localhost:3000/api
    description: Local development server

tags:
  - name: Health
    description: Service health monitoring
  - name: Auth
    description: User registration and authentication
  - name: Checkout
    description: Order checkout (authenticated)

paths:
  /healthcheck:
    get:
      tags:
        - Health
      summary: Healthcheck
      description: Returns the current health status of the API.
      operationId: healthcheck
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: ok
                timestamp: '2026-06-15T12:00:00.000Z'

  /register:
    post:
      tags:
        - Auth
      summary: Register a new user
      description: Creates a new user account. Username and email must be unique.
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              username: dave
              email: dave@example.com
              password: mypassword
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Username or email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /login:
    post:
      tags:
        - Auth
      summary: Login
      description: Authenticates a user and returns a JWT token valid for 1 hour.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              username: alice
              password: password123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Missing username or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /checkout:
    post:
      tags:
        - Checkout
      summary: Checkout
      description: |
        Places an order for one or more products. Requires a valid JWT Bearer token.

        - `cash` — 10% discount applied to subtotal
        - `credit_card` — no discount
      operationId: checkout
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutRequest'
            examples:
              cash:
                summary: Cash payment (10% discount)
                value:
                  items:
                    - productId: 1
                      quantity: 1
                    - productId: 3
                      quantity: 2
                  paymentMethod: cash
              creditCard:
                summary: Credit card payment
                value:
                  items:
                    - productId: 2
                      quantity: 1
                  paymentMethod: credit_card
      responses:
        '200':
          description: Checkout completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutResponse'
        '400':
          description: Invalid request, payment method, quantity, or insufficient stock
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing, invalid, or expired JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from the login endpoint

  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        timestamp:
          type: string
          format: date-time
      required:
        - status
        - timestamp

    RegisterRequest:
      type: object
      properties:
        username:
          type: string
          example: dave
        email:
          type: string
          format: email
          example: dave@example.com
        password:
          type: string
          format: password
          example: mypassword
      required:
        - username
        - email
        - password

    RegisterResponse:
      type: object
      properties:
        message:
          type: string
          example: User registered successfully.
        user:
          $ref: '#/components/schemas/User'
      required:
        - message
        - user

    LoginRequest:
      type: object
      properties:
        username:
          type: string
          example: alice
        password:
          type: string
          format: password
          example: password123
      required:
        - username
        - password

    LoginResponse:
      type: object
      properties:
        message:
          type: string
          example: Login successful.
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        user:
          $ref: '#/components/schemas/User'
      required:
        - message
        - token
        - user

    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        username:
          type: string
          example: alice
        email:
          type: string
          format: email
          example: alice@example.com
      required:
        - id
        - username
        - email

    CheckoutRequest:
      type: object
      properties:
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CheckoutItem'
        paymentMethod:
          type: string
          enum:
            - cash
            - credit_card
          example: cash
      required:
        - items
        - paymentMethod

    CheckoutItem:
      type: object
      properties:
        productId:
          type: integer
          example: 1
        quantity:
          type: integer
          minimum: 1
          example: 1
      required:
        - productId
        - quantity

    CheckoutResponse:
      type: object
      properties:
        message:
          type: string
          example: Checkout completed successfully.
        order:
          $ref: '#/components/schemas/Order'
      required:
        - message
        - order

    Order:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        paymentMethod:
          type: string
          enum:
            - cash
            - credit_card
        subtotal:
          type: number
          format: float
          example: 1059.97
        discount:
          type: number
          format: float
          example: 106
        discountRate:
          type: number
          format: float
          example: 0.1
        total:
          type: number
          format: float
          example: 953.97
      required:
        - items
        - paymentMethod
        - subtotal
        - discount
        - discountRate
        - total

    OrderItem:
      type: object
      properties:
        productId:
          type: integer
          example: 1
        name:
          type: string
          example: Laptop
        price:
          type: number
          format: float
          example: 999.99
        quantity:
          type: integer
          example: 1
        lineTotal:
          type: number
          format: float
          example: 999.99
      required:
        - productId
        - name
        - price
        - quantity
        - lineTotal

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Invalid username or password.
      required:
        - error
